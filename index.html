function atualizarVisualSolo(campo) {
    if (!campo.mesh) return;
    const saude = campo.vida / 100;
    if (saude > 0.7) campo.mesh.material.color.set(0x6B8E23);
    else if (saude > 0.3) campo.mesh.material.color.set(0x8B7355);
    else campo.mesh.material.color.set(0x5C4033);
}

function danificarSolo(campo, dano) {
    campo.vida = THREE.MathUtils.clamp(campo.vida - dano, 0, 100);

}

function tocarSom(tipo){
    if(audioCtx.state === 'suspended') audioCtx.resume();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    if(tipo === 'dinheiro'){
        osc.frequency.value = 800;
        gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
        osc.start(); osc.stop(audioCtx.currentTime + 0.3);
    }
    if(tipo === 'plantar'){
        osc.frequency.value = 400;
        gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
        osc.start(); osc.stop(audioCtx.currentTime + 0.2);
    }
    if(tipo === 'colher'){
        osc.frequency.value = 300;
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
        osc.start(); osc.stop(audioCtx.currentTime + 0.4);
    }
    if(tipo === 'erro'){
        osc.frequency.value = 200;
        gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
        osc.start(); osc.stop(audioCtx.currentTime + 0.3);
    }
    if(tipo === 'spray'){
        osc.frequency.value = 600;
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
        osc.start(); osc.stop(audioCtx.currentTime + 0.5);
    }
}

function atualizarTrigosNoCampo(campo, novoEstagio, qualidade = 'boa'){
    if(!campo.trigos) return;
    
    campo.fase = novoEstagio;
    if(campo.trigosMesh) scene.remove(campo.trigosMesh);
    
    if(novoEstagio === 0){
        matCauleSeco.color.set(0x4CAF50);
        matEspigaSeco.color.set(0x66BB6A);
    } else if(novoEstagio === 1){
        matCauleSeco.color.set(0x8BC34A);
        matEspigaSeco.color.set(0xCDDC39);
    } else {
        if(qualidade === 'podre'){
            matCauleSeco.color.set(0x5D4037);
            matEspigaSeco.color.set(0x6D4C41);
        } else {
            matCauleSeco.color.set(0xF9A825);
            matEspigaSeco.color.set(0xFBC02D);
        }
    }
    
    spawnarTrigosNoCampo(campo, novoEstagio);
}
  function finalizarCampo() {
    tocarSom('plantar');
    if (!campoAtual) return;

    if (implemento === 'arado') {
        campoAtual.arado = true;
        campoAtual.plantado = false;
        campoAtual.pronto = false;
        campoAtual.mesh.material.color.set(0x4E342E);
        alterarSustentabilidade(1);
        mostraMsg('✅ Terra arada com sucesso! Engate a plantadeira agora');
    }
    else if (implemento === 'plantadeira') {
        if (sementes < 10) {
            mostraMsg('❌ Precisa de 10 sementes pra plantar 1 campo inteiro!');
            cancelarArar();
            return;
        }

        // DANO NO SOLO AO PLANTAR
        danificarSolo(campoAtual, 10);
        
        // SISTEMA DE ROTAÇÃO - penaliza monocultura
        if(campoAtual.ultimoCultivo === 'trigo'){
            campoAtual.colheitasSeguidas++;
            let danoExtra = campoAtual.colheitasSeguidas * 10; // 10, 20, 30...
            danificarSolo(campoAtual, danoExtra);
            mostraMsg(`⚠️ Monocultura! ${campoAtual.colheitasSeguidas}ª vez seguida. Solo -${danoExtra}%`);
        } else {
            campoAtual.colheitasSeguidas = 1; // Primeira vez ou trocou cultivo
            if(campoAtual.ultimoCultivo !== null) mostraMsg('🌱 Rotação de cultura! Solo preservado');
        }

        campoAtual.ultimoCultivo = 'trigo'; // Marca que plantou trigo
        sementes -= 10;
        campoAtual.plantado = true;
        campoAtual.arado = false;
        campoAtual.pronto = false;
        campoAtual.fase = 0;
        campoAtual.trigos = []; // Array pros meshes 3D
        
        // SPAWNA OS BROTOS 3D
        spawnarTrigosNoCampo(campoAtual, 0);
        mostraMsg('🌱 Plantado! Crescimento: 1 minuto');

        const campoPlantadoRef = campoAtual; // guarda referência pra usar nos timeouts

        setTimeout(() => {
            if (campoPlantadoRef && campoPlantadoRef.mesh && campoPlantadoRef.plantado) {
                campoPlantadoRef.fase = 1;
                atualizarTrigosNoCampo(campoPlantadoRef, 1); // Crescendo
                mostraMsg('🌿 Crescendo...');
            }
        }, 20000);

        setTimeout(() => {
            if (campoPlantadoRef && campoPlantadoRef.mesh && campoPlantadoRef.plantado) {
                campoPlantadoRef.fase = 2;
                atualizarTrigosNoCampo(campoPlantadoRef, 2); // Quase pronto
                mostraMsg('🌾 Quase pronto!');
            }
        }, 40000);

        setTimeout(() => {
            if (campoPlantadoRef && campoPlantadoRef.mesh && campoPlantadoRef.plantado) {
                campoPlantadoRef.fase = 3;
                campoPlantadoRef.pronto = true;
                
                let qualidade = 'boa';
                if(campoPlantadoRef.vida < 40) qualidade = 'podre';
                else if(campoPlantadoRef.vida < 70) qualidade = 'verde';
                campoPlantadoRef.qualidade = qualidade;
                
                atualizarTrigosNoCampo(campoPlantadoRef, 3, qualidade);
                abrirEscolhaAgrotoxico(campoPlantadoRef); // ← ABRE O MODAL AUTOMÁTICO
            }
        }, 60000);
    }

    if (campoAtual) {
        campoAtual.arando = false;
        campoAtual.progressoArado = 0;
    }
    modoArar = false;
    campoAtual = null;
    posicaoInicialArar = null;
    updateHUD();
}

  function descarregarColheitadeira() {
    if (currentVehicle!== 'colheitadeira') {
        mostraMsg('❌ Pilote a colheitadeira [TAB] pra descarregar');
        return;
    }

    const colheitadeira = vehicles.colheitadeira;
    const caminhao = vehicles.caminhao;

    if (colheitadeira.storage <= 0) {
        mostraMsg('⚠️ Tanque vazio!');
        return;
    }

    if (!caminhao.mesh) {
        mostraMsg('❌ Caminhão não encontrado no mapa!');
        return;
    }

    // Checa distância
    const distancia = colheitadeira.mesh.position.distanceTo(caminhao.mesh.position);
    if (distancia > 18) {
        mostraMsg('❌ Encoste no caminhão pra descarregar');
        return;
    }

    // Checa espaço no caminhão
    const espacoCaminhao = caminhao.maxStorage - caminhao.storage;
    if (espacoCaminhao <= 0) {
        mostraMsg('⚠️ Caminhão cheio! Venda na fábrica [B]');
        return;
    }

    const transferir = Math.min(colheitadeira.storage, espacoCaminhao);

    // Transfere carga + histórico de qualidade pra venda
    colheitadeira.cargas = colheitadeira.cargas || [];
    caminhao.cargas = caminhao.cargas || [];

    caminhao.storage += transferir;
    caminhao.cargas.push(...colheitadeira.cargas.splice(0, transferir));
    colheitadeira.storage -= transferir;

    mostraMsg(`✅ Descarregou ${transferir} cargas | Caminhão: ${caminhao.storage}/${caminhao.maxStorage}`);
    updateHUD();
}

function atualizarVisualSolo(lote) {
    lote.vida = THREE.MathUtils.clamp(lote.vida, 0, 100);
    lote.mesh.material.color.lerpColors(corSoloMorto, corSoloVivo, lote.vida / 100);
    lote.mesh.material.roughness = 1 - (lote.vida / 200);
}

function danificarSolo(lote, dano, motivo = '') {
    const vidaAntes = lote.vida;
    lote.vida -= dano;
    lote.vida = THREE.MathUtils.clamp(lote.vida, 0, 100);
    atualizarVisualSolo(lote);
    atualizarBarraVidaCampo();
    if (lote.vida <= 0 && vidaAntes > 0) {
        tocarSom('erro');
        mostraMsg(`💀 SOLO MORTO! Campo ${motivo} virou deserto. Precisa de pousio!`);
        lote.mesh.material.color.set(0x3E2723);
    }
    else if (lote.vida <= 20 && vidaAntes > 20) {
        mostraMsg(`⚠️ SOLO CRÍTICO ${lote.vida.toFixed(0)}%! Pare de plantar trigo!`);
    }
}
window.danificarSolo = danificarSolo;

function regenerarSolo() {
    campos.forEach(lote => {
        if (lote.vida < 100 && !lote.plantado) {
            let regenBase = 10;
            
            // Bônus de pousio: regenera dobro se não plantou trigo antes
            if(lote.ultimoCultivo === null || lote.colheitasSeguidas === 0){
                regenBase = 20; // 20% a cada ciclo em vez de 10%
            }
            
            lote.vida += regenBase;
            lote.vida = THREE.MathUtils.clamp(lote.vida, 0, 100);
            atualizarVisualSolo(lote);
            
            // Zera contador quando solo recupera 100%
            if(lote.vida >= 100){
                lote.ultimoCultivo = null;
                lote.colheitasSeguidas = 0;
            }
        }
    });
    atualizarBarraVidaCampo();
}
function iniciarRegeneracaoSolo() {
    if (intervaloRegen) clearInterval(intervaloRegen);
    intervaloRegen = setInterval(() => {
        tempoRegeneracao--;
        const timerSpan = document.getElementById('timer-regen');
        if (timerSpan) {
            let min = Math.floor(tempoRegeneracao / 60);
            let seg = tempoRegeneracao % 60;
            timerSpan.innerText = `${min}:${seg.toString().padStart(2, '0')}`;
        }
        if (tempoRegeneracao <= 0) {
            regenerarSolo();
            tempoRegeneracao = 165;
        }
    }, 1000);
}
iniciarRegeneracaoSolo();

function atualizarBarraVidaCampo() {
    const infoDiv = document.getElementById('campo-info');
    const barra = document.getElementById('barra-vida-campo');
    const texto = document.getElementById('vida-campo');
    if (!campoAtualHUD) {
        infoDiv.style.display = 'none';
        return;
    }
    infoDiv.style.display = 'block';
    const vida = Math.round(campoAtualHUD.vida);
    texto.innerText = vida + '%';
    barra.style.width = vida + '%';
    if (vida > 70) barra.style.background = '#4CAF50';
    else if (vida > 40) barra.style.background = '#FFC107';
    else barra.style.background = '#F44336';

    let dicaSolo = document.getElementById('dica-solo');
    if(!dicaSolo){
        dicaSolo = document.createElement('div');
        dicaSolo.id = 'dica-solo';
        dicaSolo.style.cssText = 'font-size:10px; margin-top:3px; color:#FFC107;';
        document.getElementById('campo-info').appendChild(dicaSolo);
    }
    if(campoAtualHUD.colheitasSeguidas > 1){

        dicaSolo.style.display = 'block';
        dicaSolo.style.color = '#FF5252';
    } else if(campoAtualHUD.vida === 100 &&!campoAtualHUD.plantado){
        dicaSolo.innerText = `🌱 Pousio: Solo saudável`;
        dicaSolo.style.display = 'block';
        dicaSolo.style.color = '#81C784';
    } else {
        dicaSolo.style.display = 'none';
    }
}

function atualizarNevoa() {
    let horaAtual = Math.floor(tempo * 24);
    let inicioNevoa = 50;
    let fimNevoa = 400;
    let corNevoa = 0xcccccc;
    if(horaAtual >= 19 || horaAtual < 5) {
        inicioNevoa = 20;
        fimNevoa = 300;
        corNevoa = 0x1a1a2e;
    }
    else if(horaAtual >= 5 && horaAtual < 7) {
        inicioNevoa = 20;
        fimNevoa = 300;
        corNevoa = 0xaaaaaa;
    }
    else if(horaAtual >= 17 && horaAtual < 19) {
        inicioNevoa = 20;
        fimNevoa = 300;
        corNevoa = 0xaaaaaa;
    }
    if(!scene.fog) {
        scene.fog = new THREE.Fog(corNevoa, inicioNevoa, fimNevoa);
    } else {
        scene.fog.color.setHex(corNevoa);
        scene.fog.near = inicioNevoa;
        scene.fog.far = fimNevoa;
    }
}

 function atualizarCicloDiaNoite() {
    tempo += velocidadeTempo;
    if(tempo > 1) tempo = 0;

    const angulo = tempo * Math.PI * 2 - Math.PI/2;
    const raioSol = 500;

    sun.position.x = Math.sin(angulo) * raioSol;
    sun.position.y = Math.cos(angulo) * raioSol;

    const intensidadeSol = Math.max(0, Math.cos(angulo));
    const intensidadeAmbiente = 0.15 + intensidadeSol * 0.45;

    sun.intensity = intensidadeSol * 0.9;
    ambientLight.intensity = intensidadeAmbiente;

    let corCeu, corNevoa;
    if(intensidadeSol > 0.3) {
        corCeu = new THREE.Color(0x87CEEB);
        corNevoa = new THREE.Color(0xcccccc);
        sun.color.setHex(0xfff5e1);
    } else if(intensidadeSol > 0.05) {
        corCeu = new THREE.Color(0xff8c42);
        corNevoa = new THREE.Color(0xffb347);
        sun.color.setHex(0xff7e42);
    } else {
        corCeu = new THREE.Color(0x000510);
        corNevoa = new THREE.Color(0x0a0a1a);
        sun.color.setHex(0x334466);
    }

    scene.background = corCeu;
    if(scene.fog) scene.fog.color = corNevoa;
}

function spawnarTrigosNoCampo(campo, estagio){
  if(campo.geoCauleAtual) campo.geoCauleAtual.dispose();
    if(campo.trigosMesh) scene.remove(campo.trigosMesh);
    campo.trigos = [];
    
    // FORÇA A COR CERTA BASEADO NO ESTÁGIO
    if(estagio === 0){ // BROTO
        matCauleSeco.color.set(0x4CAF50); // Verde
        matEspigaSeco.color.set(0x66BB6A);
    } else if(estagio === 1){ // MÉDIO
        matCauleSeco.color.set(0x8BC34A); // Verde-amarelo
        matEspigaSeco.color.set(0xCDDC39);
    } else { // MADURO
        matCauleSeco.color.set(0xF9A825); // Dourado
        matEspigaSeco.color.set(0xFBC02D);
    }
    
    const pos = campo.mesh.position;
    const larguraCampo = campo.mesh.geometry.parameters.width;
    const profundidadeCampo = campo.mesh.geometry.parameters.depth;
    
    const borda = 2;
    const areaPlantavelX = larguraCampo - borda * 2;
    const areaPlantavelZ = profundidadeCampo - borda * 2;
    
    const qtdTrigo = 600; 
    const colunas = 30;
    const linhas = 20;
    
    // ALTURA BASEADA NO ESTÁGIO
    let alturaCaule = 0.4; // Broto
    if(estagio === 1) alturaCaule = 1.0; // Médio
    if(estagio === 2) alturaCaule = 1.6; // Maduro
    
    // Recria a geometria com a altura certa
    const geoCaule = new THREE.CylinderGeometry(0.04, 0.05, alturaCaule, 3);
    
    const cauleMesh = new THREE.InstancedMesh(geoCaule, matCauleSeco, qtdTrigo);
    const graoMesh = new THREE.InstancedMesh(geoGrao, matEspigaSeco, qtdTrigo * 4);
    
    let indiceGrao = 0;
    
    for(let i = 0; i < qtdTrigo; i++){
        const linha = Math.floor(i / colunas);
        const coluna = i % colunas;
        
        const offsetX = ((coluna + 0.5) / colunas - 0.5) * areaPlantavelX + (Math.random() - 0.5) * 0.6;
        const offsetZ = ((linha + 0.5) / linhas - 0.5) * areaPlantavelZ + (Math.random() - 0.5) * 0.6;
        
        const x = pos.x + offsetX;
        const z = pos.z + offsetZ;
        
        dummy.position.set(x, alturaCaule/2, z);
        dummy.rotation.y = Math.random() * Math.PI * 2;
        dummy.updateMatrix();
        cauleMesh.setMatrixAt(i, dummy.matrix);
        
        // Só mostra grãos se não for broto
        if(estagio > 0){
            for(let j = 0; j < 4; j++){
                const ang = j * 1.5;
                dummy.position.set(
                    x + Math.cos(ang) * 0.05,
                    alturaCaule - 0.2 + j * 0.05,
                    z + Math.sin(ang) * 0.05
                );
                dummy.updateMatrix();
                graoMesh.setMatrixAt(indiceGrao, dummy.matrix);
                indiceGrao++;
            }
        }
        
        campo.trigos.push({
            posicao: new THREE.Vector3(x, 0, z),
            estagio: estagio,
            indice: i
        });
    }
    
    cauleMesh.instanceMatrix.needsUpdate = true;
    graoMesh.instanceMatrix.needsUpdate = true;
    cauleMesh.castShadow = false;
    graoMesh.castShadow = false;
    
    const grupoTrigo = new THREE.Group();
    grupoTrigo.add(cauleMesh);
    if(estagio > 0) grupoTrigo.add(graoMesh); // Broto não tem espiga
    
    campo.trigosMesh = grupoTrigo;
    campo.geoCauleAtual = geoCaule; // Salva pra dar dispose depois
    scene.add(grupoTrigo);
}

function getChunkKey(x, z){
    return `${Math.floor(x / CHUNK_SIZE)},${Math.floor(z / CHUNK_SIZE)}`;
}

function createChunkContent(cx, cz) {
    const group = new THREE.Group();
    const startX = cx * CHUNK_SIZE;
    const startZ = cz * CHUNK_SIZE;
    for(let i = 0; i < 6; i++){
        const x = startX + 10 + Math.random() * (CHUNK_SIZE - 20);
        const z = startZ + 10 + Math.random() * (CHUNK_SIZE - 20);
        if(!podeNascerAqui(x, z)) continue;
        const tree = createTree();
        tree.position.set(x, 0, z);
        group.add(tree);
    }
    return group;
}

function loadChunk(cx, cz){
    const key = `${cx},${cz}`;
    if(worldObjects.has(key)) return;
    const chunkGroup = createChunkContent(cx, cz);
    scene.add(chunkGroup);
    worldObjects.set(key, chunkGroup);
}

function unloadChunk(cx, cz){
    const key = `${cx},${cz}`;
    if(!worldObjects.has(key)) return;
    const chunkGroup = worldObjects.get(key);
    scene.remove(chunkGroup);
    chunkGroup.traverse(obj => {
        if(obj.geometry) obj.geometry.dispose();
        if(obj.material) obj.material.dispose();
    });
    worldObjects.delete(key);
}

function updateChunks(){
    if(typeof vehicles === 'undefined' ||!vehicles) return;
    if(typeof currentVehicle === 'undefined' || currentVehicle === null) return;
    if(!vehicles[currentVehicle]) return;
    if(!vehicles[currentVehicle].mesh ||!vehicles[currentVehicle].mesh.position) return;
    VIEW_DISTANCE = 1;
    const pos = vehicles[currentVehicle].mesh.position;
    const playerCX = Math.floor(pos.x / CHUNK_SIZE);
    const playerCZ = Math.floor(pos.z / CHUNK_SIZE);
    for(let dx = -VIEW_DISTANCE; dx <= VIEW_DISTANCE; dx++){
        for(let dz = -VIEW_DISTANCE; dz <= VIEW_DISTANCE; dz++){
            loadChunk(playerCX + dx, playerCZ + dz);
        }
    }
    worldObjects.forEach((_, key) => {
        const [cx, cz] = key.split(',').map(Number);
        if(Math.abs(cx - playerCX) > VIEW_DISTANCE || Math.abs(cz - playerCZ) > VIEW_DISTANCE){
            unloadChunk(cx, cz);
        }
    });
}

    if (x > 276 && x < 284 && z > -35 && z < -25) return false;

    if (x > 255 && x < 265 && z > 5 && z < 15) return false;

function createTree() {
    const tree = new THREE.Group();
    const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.8, 1, 4), new THREE.MeshLambertMaterial({color: 0x8B4513}));
    trunk.position.y = 2;
    const leaves = new THREE.Mesh(new THREE.ConeGeometry(3, 8, 6), new THREE.MeshLambertMaterial({color: 0x228B22}));
    leaves.position.y = 7;
    tree.add(trunk);
    tree.add(leaves);
    const scale = 0.7 + Math.random() * 0.6;
    tree.scale.set(scale, scale + Math.random() * 0.3, scale);
    tree.rotation.y = Math.random() * Math.PI * 2;
    const corVerde = new THREE.Color().setHSL(0.25 + Math.random() * 0.1, 0.7, 0.3 + Math.random() * 0.2);
    leaves.material.color = corVerde;
    tree.userData.tipo = 'tree';
    return tree;
}

function createRock(x, z){
    const rockGroup = new THREE.Group();
    const geo = new THREE.DodecahedronGeometry(Math.random() * 1.5 + 1, 0);
    const mat = new THREE.MeshLambertMaterial({color: 0x696969});
    const rock = new THREE.Mesh(geo, mat);
    rock.castShadow = true;
    rock.receiveShadow = true;
    rockGroup.add(rock);
    for(let i = 0; i < 3; i++){
        const smallGeo = new THREE.DodecahedronGeometry(Math.random() * 0.5 + 0.3, 0);
        const smallRock = new THREE.Mesh(smallGeo, mat);
        smallRock.position.set((Math.random() - 0.5) * 2, 0, (Math.random() - 0.5) * 2);
        smallRock.rotation.set(Math.random() * Math.PI, Math.random() * Math.PI, Math.random() * Math.PI);
        rockGroup.add(smallRock);
    }
    rockGroup.position.set(x, 1, z);
    rockGroup.rotation.y = Math.random() * Math.PI * 2;
    scene.add(rockGroup);
    return rockGroup;
}

function criarGalpaoMelkstad(posX, posY, posZ, comprimento) {
    const galpao = new THREE.Group();
    const metadeComp = comprimento / 2;
    const largura = 50;
    const altura = 12;
    const telhadoGeo = new THREE.BufferGeometry();
    const vertices = new Float32Array([
        -largura/2, 0, -metadeComp, largura/2, 0, -metadeComp, 0, 8, -metadeComp,
        -largura/2, 0, metadeComp, largura/2, 0, metadeComp, 0, 8, metadeComp,
    ]);
    const indices = [0,1,2, 3,4,5, 0,3,4, 0,4,1, 0,2,5, 0,5,3, 1,4,5, 1,5,2];
    telhadoGeo.setAttribute('position', new THREE.BufferAttribute(vertices, 3));
    telhadoGeo.setIndex(indices);
    telhadoGeo.computeVertexNormals();
    const telhado = new THREE.Mesh(telhadoGeo,new THREE.MeshStandardMaterial({color: 0x8D6E63, metalness: 0.7, side: THREE.DoubleSide}));
    telhado.position.y = altura;
    telhado.castShadow = true;
    galpao.add(telhado);
    const paredeFundo = new THREE.Mesh(new THREE.BoxGeometry(largura, altura, 0.5),new THREE.MeshStandardMaterial({color: 0xD7CCC8}));
    paredeFundo.position.set(0, altura/2, -metadeComp);
    paredeFundo.castShadow = true;
    galpao.add(paredeFundo);
    const paredeLateral = new THREE.Mesh(new THREE.BoxGeometry(0.5, altura, comprimento),new THREE.MeshStandardMaterial({color: 0xD7CCC8}));
    paredeLateral.position.set(largura/2, altura/2, 0);
    galpao.add(paredeLateral);
    for(let z = -metadeComp + 15; z <= metadeComp - 15; z += 20){
        for(let y of [4, 8]){
            const ventilador = new THREE.Mesh(new THREE.CylinderGeometry(1.5, 1.5, 0.3, 16),new THREE.MeshStandardMaterial({color: 0xB0BEC5, metalness: 0.8}));
            ventilador.rotation.z = Math.PI/2;
            ventilador.position.set(largura/2 + 0.3, y, z);
            galpao.add(ventilador);
        }
    }
    const paredeFrente = new THREE.Mesh(new THREE.BoxGeometry(largura - 8, altura, 0.5),new THREE.MeshStandardMaterial({color: 0xD7CCC8}));
    paredeFrente.position.set(-4, altura/2, metadeComp);
    galpao.add(paredeFrente);
    const paredeFrente2 = new THREE.Mesh(new THREE.BoxGeometry(4, altura, 0.5),new THREE.MeshStandardMaterial({color: 0xD7CCC8}));
    paredeFrente2.position.set(largura/2 - 2, altura/2, metadeComp);
    galpao.add(paredeFrente2);
    const larguraPortao = 8;
    const alturaPortao = 6;
    const portao = new THREE.Mesh(new THREE.BoxGeometry(larguraPortao, alturaPortao, 0.6),new THREE.MeshStandardMaterial({color: 0x5D4037, metalness: 0.2}));
    portao.position.set(largura/2 - 6, alturaPortao/2, metadeComp + 0.05);
    portao.userData.aberto = false;
    portao.castShadow = true;
    galpao.add(portao);
    galpao.userData.portao = portao;
    for(let x of [-largura/2 + 0.5, largura/2 - 0.5]){
        const pilar = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.3, altura, 8),new THREE.MeshStandardMaterial({color: 0xECEFF1}));
        pilar.position.set(x, altura/2, metadeComp);
        pilar.castShadow = true;
        galpao.add(pilar);
    }
    const cerca = new THREE.Mesh(new THREE.BoxGeometry(0.2, 1.2, comprimento - 4),new THREE.MeshStandardMaterial({color: 0x757575, metalness: 0.6}));
    cerca.position.set(-largura/2 + 2, 0.6, 0);
    galpao.add(cerca);
    const piso = new THREE.Mesh(new THREE.BoxGeometry(largura - 4, 0.2, comprimento - 2),new THREE.MeshStandardMaterial({color: 0x5D4037, roughness: 1}));
    piso.position.y = 0.1;
    piso.receiveShadow = true;
    galpao.add(piso);
    const corredor = new THREE.Mesh(new THREE.BoxGeometry(4, 0.1, comprimento),new THREE.MeshStandardMaterial({color: 0x9E9E9E}));
    corredor.position.set(-largura/2 + 4, 0.21, 0);
    galpao.add(corredor);
    galpao.position.set(posX, posY, posZ);
    galpao.userData = {
        comprimento: comprimento,
        largura: largura,
        areaLivre: { minX: -largura/2 + 5, maxX: largura/2 - 2, minZ: -metadeComp + 2, maxZ: metadeComp - 2 },
        portao: portao
    };
    galpao.name = "galpaoVazio";
    return galpao;
}

window.fazerSilagem = function(kgMilho){
    if(melkstadData.milhoArmazenado < kgMilho) return 0;
    let kgRestante = kgMilho;
    let kgTotalUsado = 0;
    for(let silo of melkstad.silosSilagem){
        if(kgRestante <= 0) break;
        const espacoLivre = silo.userData.capacidade - silo.userData.kgSilagem;
        if(espacoLivre <= 0) continue;
        const kgUsar = Math.min(kgRestante, espacoLivre);
        silo.userData.kgSilagem += kgUsar;
        kgRestante -= kgUsar;
        kgTotalUsado += kgUsar;
        const altura = (silo.userData.kgSilagem / silo.userData.capacidade) * 4;
        const meshSilagem = silo.getObjectByName("silagem");
        const meshLona = silo.getObjectByName("lona");
        meshSilagem.scale.y = altura;
        meshSilagem.position.y = 0.5 + altura/2;
        meshSilagem.visible = true;
        meshLona.position.y = 0.5 + altura + 0.1;
        meshLona.visible = true;
    }
    melkstadData.milhoArmazenado -= kgTotalUsado;
    melkstadData.silagemArmazenada += kgTotalUsado;
    return kgTotalUsado;
}

function createMountain(x, z, size, height){
    const alturaFinal = height * 2.5;
    const mountain = new THREE.Mesh(
        new THREE.ConeGeometry(size, alturaFinal, 4),
        new THREE.MeshLambertMaterial({color: 0x7f8c8d})
    );
    mountain.position.set(x, alturaFinal/2, z);
    mountain.rotation.y = Math.random() * Math.PI;
    mountain.castShadow = true;
    scene.add(mountain);
    if(alturaFinal > 60){
        const neve = new THREE.Mesh(
            new THREE.ConeGeometry(size * 0.4, alturaFinal * 0.15, 4),
            new THREE.MeshLambertMaterial({color: 0xECF0F1})
        );
        neve.position.y = alturaFinal/2 - alturaFinal * 0.1;
        mountain.add(neve);
    }
    mountain.name = "montanha";
    return mountain;
}

function trocarVeiculo(veiculoEspecifico = null) {
    // Se passou um veículo específico, usa ele. Se não, pega o próximo da lista
    if (veiculoEspecifico) {
        vehicles.current = veiculoEspecifico;
        currentVehicle = veiculoEspecifico.type;
    } else {
        const ordem = ['tractor', 'colheitadeira', 'caminhao'];
        let idx = ordem.indexOf(currentVehicle);
        idx = (idx + 1) % ordem.length;
        currentVehicle = ordem[idx];
        vehicles.current = vehicles[currentVehicle];
    }

    const v = vehicles.current;
    const pos = v.mesh.position;

    // Teletransporta a câmera pra trás do veículo
    camera.position.set(pos.x, pos.y + 15, pos.z + 25);
    camera.lookAt(pos.x, pos.y, pos.z);

    // Se tu usa OrbitControls
    if (typeof controls!== 'undefined') {
        controls.target.set(pos.x, pos.y, pos.z);
        controls.update();
    }

    updateHUD();
    mostraMsg(`🚜 ${currentVehicle.toUpperCase()} | Vel: ${v.maxSpeed} | Carga: ${v.storage}/${v.maxStorage}`);
}
function createColheitadeira() {
    const group = new THREE.Group();
    
    // Materiais únicos da colheitadeira
    const vermelhoCase = new THREE.MeshStandardMaterial({ color: 0xC41E3A });
    const pretoColheitadeira = new THREE.MeshStandardMaterial({ color: 0x222222 });
    const cinzaColheitadeira = new THREE.MeshStandardMaterial({ color: 0x8B0000 });
    const rodaMatColheitadeira = new THREE.MeshStandardMaterial({ color: 0x111111 }); // RENOMEADO
    const brancoColheitadeira = new THREE.MeshStandardMaterial({ color: 0xDDDDDD });

    // 1. Corpo principal
    const corpoGeo = new THREE.BoxGeometry(3.5, 2, 6);
    const corpo = new THREE.Mesh(corpoGeo, vermelhoCase);
    corpo.position.set(0, 1.2, 0);
    group.add(corpo);

    // 2. Cabine
    const cabineGeo = new THREE.BoxGeometry(2.8, 1.8, 2.5);
    const cabine = new THREE.Mesh(cabineGeo, pretoColheitadeira);
    cabine.position.set(0, 3.1, 1.5);
    group.add(cabine);

    // 3. Graneleiro
    const tanqueGeo = new THREE.BoxGeometry(3, 1.5, 2);
    const tanque = new THREE.Mesh(tanqueGeo, cinzaColheitadeira);
    tanque.position.set(0, 2.8, -1.2);
    group.add(tanque);

    // 4. Tubo de descarga
    const tuboGeo = new THREE.CylinderGeometry(0.2, 0.2, 3, 8);
    const tuboMat = new THREE.MeshStandardMaterial({ color: 0xFF0000 });
    const tubo = new THREE.Mesh(tuboGeo, tuboMat);
    tubo.rotation.z = Math.PI / 2;
    tubo.position.set(-2, 3.5, -0.5);
    group.add(tubo);

    // 5. Plataforma de corte
    const barraGeo = new THREE.BoxGeometry(8, 0.3, 1.2);
    const barraMat = new THREE.MeshStandardMaterial({ color: 0x333333 });
    const barra = new THREE.Mesh(barraGeo, barraMat);
    barra.position.set(0, 0.3, 3.5);
    group.add(barra);

    // 6. Molinete
    for (let i = -3.5; i <= 3.5; i += 1) {
        const denteGeo = new THREE.CylinderGeometry(0.15, 0.15, 0.8, 8);
        const dente = new THREE.Mesh(denteGeo, brancoColheitadeira);
        dente.rotation.x = Math.PI / 2;
        dente.position.set(i, 0.7, 3.5);
        group.add(dente);
    }

    // 7. RODAS - USANDO rodaMatColheitadeira
    const rodaGrandeGeo = new THREE.CylinderGeometry(1.1, 1.1, 1, 16);
    const rodaPequenaGeo = new THREE.CylinderGeometry(0.7, 0.7, 0.8, 16);

    // Frente - rodas grandes
    const rodaFE = new THREE.Mesh(rodaGrandeGeo, rodaMatColheitadeira);
    rodaFE.rotation.z = Math.PI / 2;
    rodaFE.position.set(-1.9, 1.1, 2);
    group.add(rodaFE);

    const rodaFD = new THREE.Mesh(rodaGrandeGeo, rodaMatColheitadeira);
    rodaFD.rotation.z = Math.PI / 2;
    rodaFD.position.set(1.9, 1.1, 2);
    group.add(rodaFD);

    // Traseira - rodas pequenas
    const rodaTE = new THREE.Mesh(rodaPequenaGeo, rodaMatColheitadeira);
    rodaTE.rotation.z = Math.PI / 2;
    rodaTE.position.set(-1.5, 0.7, -2.2);
    group.add(rodaTE);

    const rodaTD = new THREE.Mesh(rodaPequenaGeo, rodaMatColheitadeira);
    rodaTD.rotation.z = Math.PI / 2;
    rodaTD.position.set(1.5, 0.7, -2.2);
    group.add(rodaTD);

    return { group };
}
function colherComColheitadeira(){
  if(currentVehicle!== 'colheitadeira'){
    mostraMsg('❌ Pilote a colheitadeira [TAB] pra colher');
    return;
  }

  const posicaoAtual = vehicles.colheitadeira.mesh.position;
  let campoProximo = campos.find(c => posicaoAtual.distanceTo(c.mesh.position) < 35 && c.pronto);

  if(!campoProximo){
    mostraMsg('❌ Nenhum campo maduro aqui');
    return;
  }

  if(vehicles.colheitadeira.storage >= vehicles.colheitadeira.maxStorage){
    mostraMsg('⚠️ Tanque cheio! Descarregue no caminhão [R]');
    return;
  }

  vehicles.colheitadeira.storage++;
  (vehicles.colheitadeira.cargas = vehicles.colheitadeira.cargas || []).push({
    vidaSolo: campoProximo.vida,
    tipoAgrotoxico: campoProximo.agrotoxicoTipo || 'organico'
  });

  alterarSustentabilidade(1);

  if(campoProximo.geoCauleAtual) campoProximo.geoCauleAtual.dispose();
  if(campoProximo.trigosMesh) scene.remove(campoProximo.trigosMesh);
  campoProximo.geoCauleAtual = null;
  campoProximo.trigosMesh = null;
  campoProximo.trigos = [];

  campoProximo.plantado = false;
  campoProximo.pronto = false;
  campoProximo.fase = 0;
  campoProximo.arado = false;
  campoProximo.agrotoxicoAplicado = false;
  campoProximo.agrotoxicoTipo = null;
  campoProximo.mesh.material.color.set(0x8B5A2B);

  mostraMsg(`✅ Trigo colhido! Tanque: ${vehicles.colheitadeira.storage}/${vehicles.colheitadeira.maxStorage}`);
  updateHUD();
}
 function venderDoCaminhao(){
  if(vehicles.caminhao.mesh.position.distanceTo(fabrica.position) < 40){
    if(vehicles.caminhao.storage > 0){
      vehicles.caminhao.cargas = vehicles.caminhao.cargas || [];

      let totalGanho = 0;
      const PRECOS = {
        organico: 200,
        biologico: 240,
        quimico: 280
      };

      // Se não tem histórico, vende tudo como orgânico por compatibilidade
      if(vehicles.caminhao.cargas.length === 0){
        totalGanho = vehicles.caminhao.storage * PRECOS.organico;
      } else {
        vehicles.caminhao.cargas.forEach(carga => {
          let preco = PRECOS[carga.tipoAgrotoxico] || PRECOS.organico;
          totalGanho += preco;
        });
      }

      dinheiro += totalGanho;
      tocarSom('dinheiro');
      mostraMsg(`💰 Vendeu ${vehicles.caminhao.storage} cargas por R$${totalGanho}!`);

      vehicles.caminhao.storage = 0;
      vehicles.caminhao.cargas = [];
      updateHUD();

function moverAnimais() {
    animais.forEach(animal => {
        animal.tempoDirecao--;
        if(animal.tempoDirecao <= 0) {
            animal.velocidadeX = (Math.random() - 0.5) * 0.015;
            animal.velocidadeZ = (Math.random() - 0.5) * 0.015;
            animal.tempoDirecao = 100 + Math.random() * 200;
        }
        animal.position.x += animal.velocidadeX;
        animal.position.z += animal.velocidadeZ;
        if(animal.position.x < LIMITE_PASTO.minX + 1.5 || animal.position.x > LIMITE_PASTO.maxX - 1.5) {
            animal.velocidadeX *= -1;
            animal.position.x = THREE.MathUtils.clamp(animal.position.x, LIMITE_PASTO.minX + 1.5, LIMITE_PASTO.maxX - 1.5);
        }
        if(animal.position.z < LIMITE_PASTO.minZ + 1.5 || animal.position.z > LIMITE_PASTO.maxZ - 1.5) {
            animal.velocidadeZ *= -1;
            animal.position.z = THREE.MathUtils.clamp(animal.position.z, LIMITE_PASTO.minZ + 1.5, LIMITE_PASTO.maxZ - 1.5);
        }
        if(Math.abs(animal.velocidadeX) > 0.001 || Math.abs(animal.velocidadeZ) > 0.001) {
            animal.rotation.y = Math.atan2(animal.velocidadeX, animal.velocidadeZ);
        }
    });
}

function aplicarAgrotoxico(tipo) {
    if (!campoAguardandoAgrotoxico) return;
    const campo = campoAguardandoAgrotoxico;
    
    if (campo.agrotoxicoAplicado) {
        mostrarmsg('❌ Já foi aplicado agrotóxico nesse campo');
        fecharEscolhaAgrotoxico();
        return;
    }

    if (tipo === 'organico') {
        alterarSustentabilidade(8);
        campo.agrotoxicoTipo = 'organico';
        campo.agrotoxicoAplicado = true;
        mostrarmsg('🌱 Orgânico aplicado! Sustentabilidade +8%');
    }
    
    if (tipo === 'quimico') {
        if (dinheiro < 0) {
            mostrarmsg('❌ Precisa R$ 50');
            fecharEscolhaAgrotoxico();
            return;
        }
        alterarSustentabilidade(-10);
        campo.agrotoxicoTipo = 'quimico';
        campo.agrotoxicoAplicado = true;
        mostrarmsg('☠️ Químico aplicado! Sustentabilidade -5%');
    }
    
    if (tipo === 'biologico') {
        if (dinheiro < 30) {
            mostrarmsg('❌ Precisa R$ 30');
            fecharEscolhaAgrotoxico();
            return;
        }
        dinheiro -= 30;
        alterarSustentabilidade(-5);
        campo.agrotoxicoTipo = 'biologico';
        campo.agrotoxicoAplicado = true;
        mostrarmsg('🧪 Biológico aplicado! Sustentabilidade -1%');
    }

    fecharEscolhaAgrotoxico();
}

  function moverVacas(){
    if(!vacas3D || vacas3D.length === 0) return;

    vacas3D.forEach(vaca => {
        if (!vaca ||!vaca.userData) return;

        // Se não tem destino, cria um novo
        if(!vaca.userData.destino){
            if (galpoesVacas.length === 0) return;

            // Acha o galpão mais próximo da vaca
            const galpao = galpoesVacas.find(g =>
                Math.abs(vaca.position.x - (melkstad.position.x + g.position.x)) < 30
            );

            if(!galpao ||!galpao.userData ||!galpao.userData.areaLivre) return;

            const area = galpao.userData.areaLivre;
            vaca.userData.destino = new THREE.Vector3(
                melkstad.position.x + galpao.position.x + THREE.MathUtils.randFloat(area.minX, area.maxX),
                0,
                melkstad.position.z + galpao.position.z + THREE.MathUtils.randFloat(area.minZ, area.maxZ)
            );
            vaca.userData.velocidade = THREE.MathUtils.randFloat(0.015, 0.03);
            vaca.userData.tempoAnim = vaca.userData.tempoAnim || 0;
        }

        const dir = vaca.userData.destino.clone().sub(vaca.position);
        const distancia = dir.length();

        if(distancia > 0.3){
            dir.normalize();
            vaca.position.add(dir.multiplyScalar(vaca.userData.velocidade));
            vaca.rotation.y = Math.atan2(dir.x, dir.z);

            // Animação das pernas
            vaca.userData.tempoAnim += vaca.userData.velocidade * 8;
            const balanco = Math.sin(vaca.userData.tempoAnim) * 0.6;
            if(vaca.userData.pernas && vaca.userData.pernas.length === 4){
                vaca.userData.pernas[0].rotation.x = balanco; // frente esq
                vaca.userData.pernas[3].rotation.x = balanco; // tras dir
                vaca.userData.pernas[1].rotation.x = -balanco; // frente dir
                vaca.userData.pernas[2].rotation.x = -balanco; // tras esq
            }
        } else {
            // Chegou no destino, para e espera
            if(vaca.userData.pernas){
                vaca.userData.pernas.forEach(perna => perna.rotation.x = 0);
            }

            if(!vaca.userData.tempoParada) vaca.userData.tempoParada = Date.now();
            const tempoEspera = THREE.MathUtils.randFloat(4000, 10000);

            if(Date.now() - vaca.userData.tempoParada > tempoEspera){
                vaca.userData.destino = null;
                vaca.userData.tempoParada = null;
            }
        }
    });
}

function atualizarVeiculo(){
    const current = getCurrentVehicle();
    if(!current || !current.mesh) return;

    const speed = 0.4;
    const rotSpeed = 0.03;

    // Frente/trás
    if(keys['w'] || keys['ArrowUp']){
        current.mesh.position.x -= Math.sin(current.mesh.rotation.y) * speed;
        current.mesh.position.z -= Math.cos(current.mesh.rotation.y) * speed;
    }
    if(keys['s'] || keys['ArrowDown']){
        current.mesh.position.x += Math.sin(current.mesh.rotation.y) * speed * 0.6;
        current.mesh.position.z += Math.cos(current.mesh.rotation.y) * speed * 0.6;
    }

    // Girar
    if(keys['a'] || keys['ArrowLeft']){
        current.mesh.rotation.y += rotSpeed;
    }
    if(keys['d'] || keys['ArrowRight']){
        current.mesh.rotation.y -= rotSpeed;
    }

    // Limita dentro do mundo
    current.mesh.position.x = THREE.MathUtils.clamp(current.mesh.position.x, -400, 400);
    current.mesh.position.z = THREE.MathUtils.clamp(current.mesh.position.z, -400, 400);
}

    scene.fog = fogTemp;

    // Som do motor
    if(Math.abs(veiculoData.speed) > 0.05){
        somMotor(true);
        if(motorOsc) motorOsc.frequency.value = 60 + Math.abs(veiculoData.speed) * 40;
    } else {
        somMotor(false);
    }

    // MOVIMENTO
    let velocidadeAlvo = 0;
    let velocidadeMaxLocal = veiculoData.maxSpeed;

    if (modoArar && currentVehicle === 'tractor') {
        velocidadeMaxLocal = 0.5;
    }

    if (keys['w'] || keys['ArrowUp']) {
        velocidadeAlvo = velocidadeMaxLocal;
    }
    if (keys['s'] || keys['ArrowDown']) {
        velocidadeAlvo = -velocidadeMaxLocal * 0.6;
    }

    if (veiculoData.speed < velocidadeAlvo) {
        veiculoData.speed += veiculoData.acceleration;
        if (veiculoData.speed > velocidadeAlvo) veiculoData.speed = velocidadeAlvo;
    }
    if (veiculoData.speed > velocidadeAlvo) {
        veiculoData.speed -= veiculoData.acceleration;
        if (veiculoData.speed < velocidadeAlvo) veiculoData.speed = velocidadeAlvo;
    }
    if (velocidadeAlvo === 0) {
        if (veiculoData.speed > 0) veiculoData.speed -= veiculoData.acceleration;
        if (veiculoData.speed < 0) veiculoData.speed += veiculoData.acceleration;
        if (Math.abs(veiculoData.speed) < 0.01) veiculoData.speed = 0;
    }

// === COLISÃO COM ÁRVORES ===
if (Math.abs(veiculoData.speed) > 0.01) {
    const direcao = new THREE.Vector3(0, 0, 1).applyAxisAngle(new THREE.Vector3(0, 1, 0), meshVeiculo.rotation.y);
    const nextPos = meshVeiculo.position.clone().add(direcao.multiplyScalar(veiculoData.speed));

    let bateu = false;
    for(const chunk of worldObjects.values()){
        for(const obj of chunk.children){
            if(obj.userData && obj.userData.tipo === 'tree'){
                const dist = nextPos.distanceTo(obj.position);
                if(dist < 2.5){ // raio do tronco + raio do trator
                    bateu = true;
                    break;
                }
            }
        }
        if(bateu) break;
    }

    if(!bateu){
        meshVeiculo.position.copy(nextPos);
    } else {
        veiculoData.speed = 0; // Bateu, para o veículo
    }
}
// === FIM COLISÃO ===

    if (Math.abs(veiculoData.speed) > 0.05) {
        let velocidadeCurva = 0.04;
        if (currentVehicle === 'caminhao') velocidadeCurva = 0.03;

        if (keys['a'] || keys['ArrowLeft']) {
            meshVeiculo.rotation.y += velocidadeCurva;
        }
        if (keys['d'] || keys['ArrowRight']) {
            meshVeiculo.rotation.y -= velocidadeCurva;
        }
    }

    // IMPLEMENTO
    if (implemento && tractor && currentVehicle === 'tractor') {
        if (aradoEngatado && arado) {
            arado.position.copy(tractor.position);
            arado.rotation.copy(tractor.rotation);
            arado.rotation.y += Math.PI;
            arado.position.y = 0;
            arado.translateZ(4);
        }
        if (plantadeiraEngatada && plantadeira) {
            plantadeira.position.copy(tractor.position);
            plantadeira.rotation.copy(tractor.rotation);
            plantadeira.rotation.y += Math.PI;
            plantadeira.position.y = 0;
            plantadeira.translateZ(4);
        }
    }

    // MODO ARAR
    if (modoArar && campoAtual && posicaoInicialArar && tractor && currentVehicle === 'tractor') {
        const distPercorrida = tractor.position.distanceTo(posicaoInicialArar);
        const larguraCampo = 60;
        campoAtual.progressoArado = Math.min(100, (distPercorrida / larguraCampo) * 100);

        if (implemento === 'arado') {
            campoAtual.mesh.material.color.set(0x4E342E);
        } else if (implemento === 'plantadeira') {
            campoAtual.mesh.material.color.set(0x556B2F);
        }

        if (campoAtual.progressoArado >= 100) {
            finalizarCampo();
        }
    }

    moverAnimais();

    // CAMERA SEGUINDO VEÍCULO ATUAL
    const distancia = 20;
    const altura = 10;
    const angle = meshVeiculo.rotation.y;

    camera.position.x = meshVeiculo.position.x - Math.sin(angle) * distancia;
    camera.position.z = meshVeiculo.position.z - Math.cos(angle) * distancia;
    camera.position.y = meshVeiculo.position.y + altura;
    camera.lookAt(meshVeiculo.position);

// PRODUÇÃO DE LEITE
if(vacas > 0){
    const leiteAntes = Math.floor(leite);
    leite += vacas * producaoPorSegundo * (1/60); // 60fps
    if(Math.floor(leite) > leiteAntes){
        updateHUD();
    }
}
  // DETECTA CAMPO ATUAL PRA MOSTRAR VIDA NO HUD
let campoProximoHUD = null;
const posVeiculo = vehicles[currentVehicle].mesh.position;

for (let campo of campos) {
    if (posVeiculo.distanceTo(campo.mesh.position) < 35) {
        campoProximoHUD = campo;
        break;
    }
}

// Só atualiza se mudou de campo
if (campoProximoHUD!== campoAtualHUD) {
    campoAtualHUD = campoProximoHUD;
    atualizarBarraVidaCampo();
}

// Atualiza barra se tá num campo
if (campoAtualHUD) {
    atualizarBarraVidaCampo();
}
    renderer.render(scene, camera);
}
function engatarArado(){
    if(tractor.position.distanceTo(arado.position) < 15){
        aradoEngatado = true;
        plantadeiraEngatada = false;
        colheitadeiraEngatada = false;
        implemento = 'arado';
        // arado.visible = false; <-- APAGA ESSA LINHA
        mostraMsg('🔧 Arado engatado! Vá no campo e aperte E pra começar');
    } else {
        mostraMsg('❌ Chegue perto do arado na garagem');
    }
}

function engatarPlantadeira(){
    if(tractor.position.distanceTo(plantadeira.position) < 15){
        plantadeiraEngatada = true;
        aradoEngatado = false;
        colheitadeiraEngatada = false;
        implemento = 'plantadeira';
        // plantadeira.visible = false; <-- APAGA ESSA LINHA TAMBÉM
        mostraMsg('🔧 Plantadeira engatada! Are a terra primeiro, depois E pra plantar');
    } else {
        mostraMsg('❌ Chegue perto da plantadeira na garagem');
    }
}
function usarImplemento(){
  let campoProximo = campos.find(c => tractor.position.distanceTo(c.mesh.position) < 35);
  if(!campoProximo){
    mostraMsg('❌ Chegue perto de um campo');
    return;
  }
if(!campoProximo.comprado){
  mostraMsg('❌ Compre este terreno primeiro! Aperte F');
  return;
}
  if(implemento === 'arado' && !campoProximo.arado && !campoProximo.plantado && !modoArar){
    modoArar = true;
    campoAtual = campoProximo;
    campoAtual.arando = true;
    campoAtual.progressoArado = 0;
    posicaoInicialArar = tractor.position.clone();
    const centroCampoX = campoProximo.mesh.position.x;
    direcaoArar = tractor.position.x < centroCampoX? 1 : -1;
    mostraMsg('🚜 MODO ARAR ATIVO! Atravesse o campo devagar');
    updateHUD(); // CORRETO
    return;
  }

  if(implemento === 'plantadeira' && campoProximo.arado && !campoProximo.plantado && sementes > 0 && !modoArar){
    modoArar = true;
    campoAtual = campoProximo;
    campoAtual.arando = true;
    campoAtual.progressoArado = 0;
    posicaoInicialArar = tractor.position.clone();
    const centroCampoX = campoProximo.mesh.position.x;
    direcaoArar = tractor.position.x < centroCampoX? 1 : -1;
    mostraMsg('🌱 MODO PLANTAR ATIVO! Atravesse o campo devagar');
    updateHUD(); // CORRETO
    return;
  }

  if(implemento === 'plantadeira' && !campoProximo.arado){
    mostraMsg('❌ Precisa arar a terra primeiro! Use o arado');
  }
  else if(sementes == 0){
    mostraMsg('❌ Sem sementes!');
  }
  else if(modoArar){
    mostraMsg('❌ Termine de arar/plantar primeiro!');
  }
  else {
    mostraMsg('❌ Implemento errado ou campo já plantado');
  }
}
  function trocarVeiculo(veiculoEspecifico = null) {
    // Se passou um veículo específico, usa ele. Se não, pega o próximo da lista
    if (veiculoEspecifico) {
        vehicles.current = veiculoEspecifico;
        currentVehicle = veiculoEspecifico.type;
    } else {
        const ordem = ['tractor', 'colheitadeira', 'caminhao'];
        let idx = ordem.indexOf(currentVehicle);
        idx = (idx + 1) % ordem.length;
        currentVehicle = ordem[idx];
        vehicles.current = vehicles[currentVehicle];
    }

    const v = vehicles.current;
    const pos = v.mesh.position;

    // Teletransporta a câmera pra trás do veículo
    camera.position.set(pos.x, pos.y + 15, pos.z + 25);
    camera.lookAt(pos.x, pos.y, pos.z);

    // Se tu usa OrbitControls
    if (typeof controls!== 'undefined') {
        controls.target.set(pos.x, pos.y, pos.z);
        controls.update();
    }

    updateHUD();
    mostraMsg(`🚜 ${currentVehicle.toUpperCase()} | Vel: ${v.maxSpeed} | Carga: ${v.storage}/${v.maxStorage}`);
}
function comprarVaca(){
    if(dinheiro >= precoVaca){
        dinheiro -= precoVaca;
        vacas++;
        criarVaca3D(vacas - 1); // -1 pq array começa em 0
        updateHUD();
        mostraMsg('🐄 Vaca comprada! Total: ' + vacas);
    } else {
        mostraMsg('❌ Dinheiro insuficiente');
    }
}

function venderLeite(){
    if(leite >= 1){
        const litros = Math.floor(leite);
        const ganho = litros * precoLeite;
        dinheiro += ganho;
        leite -= litros;
        updateHUD();
        mostraMsg(`🥛 Vendeu ${litros}L por R$${ganho}`);
    
    } else {
        mostraMsg('❌ Sem leite suficiente');
    }
}
// 3. SÓ CHAMA updateHUD() DEPOIS QUE A PÁGINA CARREGAR
document.addEventListener('DOMContentLoaded', () => {
    updateHUD(); // Primeira vez que mostra os valores
});
window.addEventListener('keydown', (e) => {
    if(modoEscolhaAgrotoxico || pausarJogo) return;
    const key = e.key.toLowerCase();
    if (key === 'tab') {
        e.preventDefault();
        e.stopImmediatePropagation();
        trocarVeiculo();
        return;
    }
    keys[key] = true;
    if(key === 'f') comprarTerreno();
    if(key === 'p') abrirLoja();
    if(key === '1') engatarArado();
    if(key === '2') engatarPlantadeira();
    if(key === '0') desengatar();
    if(key === 'e') usarImplemento();
    if(key === 'c') colherComColheitadeira();
    if(key === 'r') descarregarColheitadeira();
    if(key === 'b') venderDoCaminhao();
    if(key === 'l'){
        if(tutorialAtivo) fecharTutorial();
        else abrirTutorial();
    }
}, true);
  window.addEventListener('keyup', (e) => {keys[e.key.toLowerCase()] = false;});
animate();
</script>
